apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: storemaker
  namespace: default
  labels:
    app: storemaker
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: storemaker
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
